<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AR Model</title>
  <script type="module" src="https://googleapis.com"></script>
  <style>
    body { margin: 0; padding: 0; width: 100vw; height: 100vh; }
    model-viewer { width: 100%; height: 100%; background-color: #f0f0f0; }
  </style>
</head>
<body>

  <!-- Using the absolute live link to explicitly trigger Android's Scene Viewer app -->
  <model-viewer 
    src="https://github.io" 
    ar 
    ar-modes="scene-viewer quick-look webxr" 
    camera-controls 
    touch-action="none" 
    shadow-intensity="1">
    <button slot="ar-button" style="background-color: #1a73e8; color: white; border: none; border-radius: 24px; position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); padding: 14px 28px; font-weight: bold; font-size: 16px; box-shadow: 0px 4px 12px rgba(0,0,0,0.3); z-index: 9999;">
      🚗 View Car in My Room (AR)
    </button>
  </model-viewer>

</body>
</html>
