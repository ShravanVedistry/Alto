<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AR Model</title>
  <script type="module" src="https://googleapis.com"></script>
  <style>
    body { margin: 0; padding: 0; width: 100vw; height: 100vh; }
    model-viewer { width: 100%; height: 100%; background-color: #f0f0f0; }
  </style>
</head>
<body>

  <!-- Re-ordered modes to load scene-viewer directly for the large file -->
  <model-viewer src="2020_maruti_suzuki_alto_800.glb" ar ar-modes="scene-viewer quick-look webxr" camera-controls touch-action="none" shadow-intensity="1">
    <button slot="ar-button" style="background-color: white; border: 2px solid #000; border-radius: 6px; position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 14px 24px; font-weight: bold; font-size: 16px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); z-index: 9999;">
      🚗 View Car in My Room (AR)
    </button>
  </model-viewer>

</body>
</html>
