<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AR Model</title>
  <!-- Fixed Google model-viewer script library link -->
  <script type="module" src="https://googleapis.com"></script>
  <style>
    body { margin: 0; padding: 0; width: 100vw; height: 100vh; }
    model-viewer { width: 100%; height: 100%; background-color: #f0f0f0; }
  </style>
</head>
<body>

  <!-- Points directly to your car model filename -->
  <model-viewer src="2020_maruti_suzuki_alto_800.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls touch-action="none" shadow-intensity="1">
    <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
      👋 Activate AR
    </button>
  </model-viewer>

</body>
</html>
